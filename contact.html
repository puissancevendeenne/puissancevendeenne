  <main class="contact-page">

          <h1 class="contact-title">
            Vous avez besoin de plus d'informations ?<br>
            Vous désirez nous poser une question ?<br>
            Contactez-nous via le formulaire ci-dessous !
          </h1>

          <form
            class="contact-form"
            action="https://formspree.io/f/mqeylnbp"
            method="POST"
          >
          <input type="hidden" name="_subject" value="Message depuis le site Puissance Vendéenne">
<input type="hidden" name="_next" value="merci.html">
<input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="display:none">
            <div class="form-group">
  <input type="text" id="nom" name="Nom" placeholder="Votre nom*" required>
</div>

<div class="form-group">
  <input type="text" id="prenom" name="Prénom" placeholder="Votre prénom *" required>
</div>

<div class="form-group">
  <input type="email" id="email" name="Adresse mél" placeholder="Votre adresse mél*" required>
</div>

<div class="form-group">
  <input type="text" id="instagram" name="Compte Instagram" placeholder="Votre compte Instagram">
</div>

<div class="form-group">
  <textarea id="message" name="Message" placeholder="Votre message*" required></textarea>
</div>

            <button type="submit" class="contact-submit">
              J'envoie mon message
            </button>
          </form>
        </div>
